<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>KUB-CALL</title>
    <link rel="manifest" id="manifest-link">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231a73e8'/%3E%3Cpath d='M24 16c-1.1 0-2 .9-2 2v28c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V18c0-1.1-.9-2-2-2H24zm2 4h12v20H26V20zm0 24h12v2H26v-2z' fill='%23fff'/%3E%3Ccircle cx='32' cy='46' r='2' fill='%23fff'/%3E%3C/svg%3E">
    <style>
        /* Minimalista 2D, compacto */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#f2f4f8;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:1rem;
            color:#1e293b;
        }
        .app {
            max-width:600px;
            width:100%;
            background:#fff;
            border:1px solid #e2e8f0;
            padding:1.5rem 1.2rem;
            box-shadow:0 2px 6px rgba(0,0,0,0.02);
        }
        /* Encabezado con logo */
        .header {
            display:flex;
            align-items:center;
            gap:0.6rem;
            margin-bottom:1.2rem;
            border-bottom:1px solid #eef2f6;
            padding-bottom:0.6rem;
        }
        .logo {
            width:40px;
            height:40px;
            flex-shrink:0;
        }
        .header h1 {
            font-size:1.5rem;
            font-weight:600;
            letter-spacing:-0.3px;
            color:#0b1f33;
        }
        .header h1 span { color:#1a73e8; }
        .header small {
            font-size:0.7rem;
            color:#5e6f88;
            margin-left:auto;
            background:#eef2f6;
            padding:0.15rem 0.6rem;
            border-radius:20px;
        }

        /* Controles en grid compacto */
        .controls {
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:0.6rem 1rem;
            margin:0.8rem 0 1rem 0;
        }
        .ctrl { display:flex; flex-direction:column; gap:0.15rem; }
        .ctrl.full { grid-column:1/-1; }
        .ctrl label {
            font-size:0.7rem;
            font-weight:500;
            text-transform:uppercase;
            letter-spacing:0.3px;
            color:#475569;
        }
        .ctrl input {
            padding:0.4rem 0.6rem;
            border:1px solid #d1d9e6;
            background:#fafbfc;
            font-size:0.95rem;
            width:100%;
            border-radius:0;
            transition:border 0.1s;
            color:#0b1f33;
        }
        .ctrl input:focus {
            border-color:#1a73e8;
            background:#fff;
            outline:none;
        }
        .ctrl input[type="number"] { -moz-appearance:textfield; }
        .ctrl input[type="number"]::-webkit-outer-spin-button,
        .ctrl input[type="number"]::-webkit-inner-spin-button { -webkit-appearance:none; }

        .btn {
            background:#1a73e8;
            border:none;
            color:#fff;
            font-weight:600;
            font-size:0.9rem;
            padding:0.55rem 0.8rem;
            cursor:pointer;
            transition:background 0.1s;
            border-radius:0;
            width:100%;
            letter-spacing:0.2px;
        }
        .btn:hover { background:#1557b0; }
        .btn:active { background:#0f4590; }
        .btn-secondary { background:#eef2f6; color:#1e293b; }
        .btn-secondary:hover { background:#dce3ec; }
        .btn-success { background:#0b8a4a; }
        .btn-success:hover { background:#09733d; }
        .btn:disabled { opacity:0.5; cursor:default; }

        .actions {
            display:flex;
            gap:0.6rem;
            margin:0.8rem 0 1rem 0;
            flex-wrap:wrap;
        }
        .actions .btn { flex:1; min-width:90px; }

        /* Lista de números */
        .list-header {
            display:flex;
            justify-content:space-between;
            align-items:baseline;
            margin-top:0.8rem;
            padding-top:0.6rem;
            border-top:1px solid #eef2f6;
            font-size:0.8rem;
            color:#475569;
        }
        .list-header .count { font-weight:600; color:#0b1f33; }

        .number-list {
            display:flex;
            flex-wrap:wrap;
            gap:0.3rem 0.6rem;
            margin-top:0.6rem;
            max-height:260px;
            overflow-y:auto;
            padding:0.6rem 0.4rem;
            background:#fafbfc;
            border:1px solid #e2e8f0;
            align-items:center;
        }
        .number-list .num-item {
            font-family:'SF Mono', 'Menlo', monospace;
            font-size:0.8rem;
            background:#fff;
            padding:0.1rem 0.5rem;
            border:1px solid #e2e8f0;
            color:#1e293b;
            letter-spacing:0.2px;
        }
        .number-list .empty-msg {
            color:#8a9bb0;
            font-size:0.85rem;
            width:100%;
            text-align:center;
            padding:1rem 0;
        }

        /* Responsive */
        @media (max-width:480px) {
            .app { padding:1rem 0.8rem; }
            .controls { grid-template-columns:1fr; gap:0.5rem; }
            .header h1 { font-size:1.3rem; }
            .actions { flex-direction:column; }
            .actions .btn { min-width:auto; }
            .number-list { max-height:180px; }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Header con logo SVG inline -->
    <div class="header">
        <svg class="logo" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="64" height="64" rx="12" fill="#1a73e8" />
            <path d="M20 14c-1.8 0-3.2 1.4-3.2 3.2v29.6c0 1.8 1.4 3.2 3.2 3.2h24c1.8 0 3.2-1.4 3.2-3.2V17.2c0-1.8-1.4-3.2-3.2-3.2H20zm2.4 4.8h19.2v22.4H22.4V18.8zm0 25.6h19.2v2.4H22.4v-2.4z" fill="#fff" />
            <circle cx="32" cy="48" r="2.4" fill="#fff" />
        </svg>
        <h1>KUB<span>-CALL</span></h1>
        <small>ETECSA</small>
    </div>

    <!-- Controles -->
    <div class="controls">
        <div class="ctrl">
            <label for="desde">Desde Call</label>
            <input type="number" id="desde" min="50" max="59" value="50" step="1">
        </div>
        <div class="ctrl">
            <label for="hasta">Hasta Call</label>
            <input type="number" id="hasta" min="50" max="59" value="59" step="1">
        </div>
        <div class="ctrl full">
            <label for="cantidad">Cantidades</label>
            <input type="number" id="cantidad" min="1" max="100000" value="10" step="1">
        </div>
        <div class="ctrl full" style="margin-top:0.2rem;">
            <button class="btn" id="generarBtn">Buscar</button>
        </div>
    </div>

    <!-- Acciones -->
    <div class="actions">
        <button class="btn btn-secondary" id="limpiarBtn">Vaciar</button>
        <button class="btn btn-success" id="exportarBtn">Exportar</button>
    </div>

    <!-- Lista de números -->
    <div class="list-header">
        <span>Números generados</span>
        <span class="count" id="contador">0</span>
    </div>
    <div class="number-list" id="listaNumeros">
        <div class="empty-msg">Sin números</div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // DOM
        const desde = document.getElementById('desde');
        const hasta = document.getElementById('hasta');
        const cantidad = document.getElementById('cantidad');
        const generar = document.getElementById('generarBtn');
        const limpiar = document.getElementById('limpiarBtn');
        const exportar = document.getElementById('exportarBtn');
        const lista = document.getElementById('listaNumeros');
        const contador = document.getElementById('contador');

        // Estado (Set de strings "+53 50######")
        const numeros = new Set();

        // ========== FUNCIONES ==========

        function formatear(prefijo, sufijo) {
            return '+53 ' + prefijo + sufijo;
        }

        function sufijoAleatorio() {
            return String(Math.floor(Math.random() * 1000000)).padStart(6, '0');
        }

        // Genera un número único dentro del rango [desde, hasta]
        function generarUnico(desdeVal, hastaVal, set) {
            const maxIntentos = 2000;
            for (let i = 0; i < maxIntentos; i++) {
                const p = Math.floor(Math.random() * (hastaVal - desdeVal + 1)) + desdeVal;
                const s = sufijoAleatorio();
                const num = formatear(p, s);
                if (!set.has(num)) return num;
            }
            return null;
        }

        // Generar n números únicos
        function generarNumeros(cant, desdeVal, hastaVal) {
            const nuevos = [];
            const totalEspacio = (hastaVal - desdeVal + 1) * 1000000;
            if (cant > totalEspacio) {
                alert('El rango solo permite ' + totalEspacio + ' números únicos.');
                return [];
            }
            const tempSet = new Set(numeros);
            for (let i = 0; i < cant; i++) {
                const num = generarUnico(desdeVal, hastaVal, tempSet);
                if (num === null) {
                    alert('No se pudo generar más números únicos. Intenta con un rango mayor o menos cantidad.');
                    break;
                }
                tempSet.add(num);
                nuevos.push(num);
            }
            // Actualizar el set principal
            for (const n of nuevos) numeros.add(n);
            return nuevos;
        }

        // Renderizar lista
        function renderizar() {
            const arr = Array.from(numeros);
            if (arr.length === 0) {
                lista.innerHTML = '<div class="empty-msg">Sin números</div>';
                contador.textContent = '0';
                return;
            }
            // Ordenar: por prefijo y sufijo
            arr.sort((a,b) => {
                const x = a.replace('+53 ','').replace(' ','');
                const y = b.replace('+53 ','').replace(' ','');
                return x.localeCompare(y);
            });
            let html = '';
            for (const num of arr) {
                html += `<span class="num-item">${num}</span>`;
            }
            lista.innerHTML = html;
            contador.textContent = arr.length;
        }

        // Exportar VCF
        function exportarVCF() {
            if (numeros.size === 0) {
                alert('No hay números para exportar.');
                return;
            }
            let vcf = '';
            let idx = 1;
            for (const num of numeros) {
                const tel = num.replace(/\s/g,''); // "+5350XXXXXX"
                const nom = 'KUB-CALL-' + String(idx).padStart(5,'0');
                vcf += 'BEGIN:VCARD\nVERSION:3.0\nFN:' + nom + '\nTEL;TYPE=CELL:' + tel + '\nEND:VCARD\n';
                idx++;
            }
            const blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'KUB-CALL_contactos.vcf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function limpiarLista() {
            if (numeros.size === 0) return;
            numeros.clear();
            renderizar();
        }

        // ========== MANEJADORES ==========

        function handleGenerar() {
            const d = parseInt(desde.value, 10);
            const h = parseInt(hasta.value, 10);
            const c = parseInt(cantidad.value, 10);

            if (isNaN(d) || isNaN(h) || isNaN(c)) {
                alert('Todos los campos deben ser números.');
                return;
            }
            if (d < 50 || d > 59 || h < 50 || h > 59) {
                alert('Los prefijos deben estar entre 50 y 59.');
                return;
            }
            if (d > h) {
                alert('El prefijo "desde" no puede ser mayor que "hasta".');
                return;
            }
            if (c < 1 || c > 100000) {
                alert('La cantidad debe estar entre 1 y 100 000.');
                return;
            }

            const nuevos = generarNumeros(c, d, h);
            if (nuevos.length) renderizar();
        }

        // ========== EVENTOS ==========
        generar.addEventListener('click', handleGenerar);
        limpiar.addEventListener('click', limpiarLista);
        exportar.addEventListener('click', exportarVCF);

        // Enter en inputs
        [desde, hasta, cantidad].forEach(inp => {
            inp.addEventListener('keydown', e => {
                if (e.key === 'Enter') { e.preventDefault(); generar.click(); }
            });
        });

        // ========== PWA: MANIFEST + SERVICE WORKER ==========
        function setupPWA() {
            // Manifest (blob)
            const manifest = {
                name: 'KUB-CALL',
                short_name: 'KUB-CALL',
                start_url: location.href.split('?')[0],
                display: 'standalone',
                background_color: '#f2f4f8',
                theme_color: '#1a73e8',
                icons: [
                    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='24' fill='%231a73e8'/%3E%3Cpath d='M72 48c-4.8 0-8 3.2-8 8v80c0 4.8 3.2 8 8 8h48c4.8 0 8-3.2 8-8V56c0-4.8-3.2-8-8-8H72zm6 12h36v56H78V60zm0 64h36v6H78v-6z' fill='%23fff'/%3E%3Ccircle cx='96' cy='138' r='6' fill='%23fff'/%3E%3C/svg%3E",
                      sizes:"192x192", type:"image/svg+xml", purpose:"any maskable" },
                    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='48' fill='%231a73e8'/%3E%3Cpath d='M176 112c-12 0-20 8-20 20v216c0 12 8 20 20 20h160c12 0 20-8 20-20V132c0-12-8-20-20-20H176zm16 24h128v144H192V136zm0 168h128v16H192v-16z' fill='%23fff'/%3E%3Ccircle cx='256' cy='360' r='16' fill='%23fff'/%3E%3C/svg%3E",
                      sizes:"512x512", type:"image/svg+xml", purpose:"any maskable" }
                ]
            };
            const manifestBlob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
            const manifestURL = URL.createObjectURL(manifestBlob);
            document.getElementById('manifest-link').href = manifestURL;

            // Service Worker (blob)
            if ('serviceWorker' in navigator) {
                const swCode = `
                    self.addEventListener('install', e => {
                        e.waitUntil(
                            caches.open('kub-call-v1').then(c => c.addAll(['/']))
                        );
                    });
                    self.addEventListener('fetch', e => {
                        e.respondWith(
                            caches.match(e.request).then(r => r || fetch(e.request))
                        );
                    });
                `;
                const swBlob = new Blob([swCode], {type:'application/javascript'});
                const swURL = URL.createObjectURL(swBlob);
                navigator.serviceWorker.register(swURL, {scope:'/'})
                    .catch(() => console.warn('SW no registrado (posiblemente por blob URL)'));
            }
        }
        setupPWA();

        // Render inicial
        renderizar();
    })();
</script>
</body>
</html>
