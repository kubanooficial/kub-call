<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="Directorio telefónico de Cuba basado en datos de ETECSA. Generador de contactos con teléfonos fijos y móviles reales por provincia.">
    <meta name="keywords" content="ETECSA, Cuba, directorio telefónico, teléfonos cubanos, Cubacel, contactos">
    <meta name="author" content="OWE">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#0056b3">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="Referrer-Policy" content="no-referrer">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=()">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:;">
    <meta property="og:title" content="Contactos | CU - Directorio ETECSA">
    <meta property="og:description" content="Directorio telefónico de Cuba basado en datos de ETECSA.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_CU">
    <title>Contactos | CU</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%230056b3'/%3E%3Cpath d='M20 18c0-2 2-4 4-4h16c2 0 4 2 4 4v28c0 2-2 4-4 4H24c-2 0-4-2-4-4V18z' fill='%23fff'/%3E%3Ccircle cx='32' cy='44' r='3' fill='%230056b3'/%3E%3Crect x='27' y='17' width='10' height='2' rx='1' fill='%230056b3'/%3E%3C/svg%3E">
    <style>
        :root {
            --primary: #0056b3;
            --primary-dark: #003d80;
            --secondary: #007bff;
            --accent: #00c853;
            --bg: #eef2f7;
            --card: #ffffff;
            --text: #2c3e50;
            --text-light: #6c757d;
            --border: #dee2e6;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 10px;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
            line-height: 1.5;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
        }
        header {
            text-align: center;
            margin-bottom: 28px;
            padding: 20px 0;
        }
        .logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .logo-wrapper svg {
            width: 56px;
            height: 56px;
            flex-shrink: 0;
        }
        header h1 {
            color: var(--primary);
            font-size: clamp(1.6rem, 4vw, 2.6rem);
            letter-spacing: -0.5px;
        }
        header h2 {
            color: var(--text-light);
            font-weight: 400;
            font-size: clamp(0.85rem, 2vw, 1.15rem);
            margin-top: 4px;
        }
        .search-panel {
            background: var(--card);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 18px;
            align-items: end;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .form-group input,
        .form-group select {
            padding: 10px 12px;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fff;
            color: var(--text);
            width: 100%;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(0,123,255,0.15);
        }
        .radio-group {
            display: flex;
            gap: 12px;
            padding-top: 6px;
            flex-wrap: wrap;
        }
        .radio-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 400;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: none;
            letter-spacing: 0;
            color: var(--text);
            white-space: nowrap;
        }
        .radio-group input[type="radio"] {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
        }
        .btn {
            padding: 12px 28px;
            background-color: var(--primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 100%;
        }
        .btn:hover {
            background-color: var(--primary-dark);
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-success {
            background-color: var(--accent);
            color: #fff;
        }
        .btn-success:hover {
            background-color: #00a844;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--card);
            padding: 18px 14px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
            border-top: 3px solid var(--primary);
        }
        .stat-card h3 {
            font-size: 0.8rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }
        .stat-card p {
            font-size: clamp(1.4rem, 3vw, 2rem);
            font-weight: 800;
            color: var(--primary);
        }
        .table-container {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow-x: auto;
            margin-bottom: 20px;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        th {
            background-color: #f8f9fb;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            font-size: 0.78rem;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        tr:hover td {
            background-color: #f0f6ff;
        }
        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }
        .actions .btn {
            width: auto;
        }
        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-light);
            font-style: italic;
            font-size: 0.95rem;
        }
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .search-panel {
                grid-template-columns: 1fr 1fr;
                padding: 16px;
                gap: 14px;
            }
            .search-panel .form-group:last-child {
                grid-column: 1 / -1;
            }
            th, td {
                padding: 10px 12px;
                font-size: 0.82rem;
            }
            .logo-wrapper svg {
                width: 42px;
                height: 42px;
            }
        }
        @media (max-width: 480px) {
            .search-panel {
                grid-template-columns: 1fr;
            }
            .radio-group {
                gap: 8px;
            }
            .stats {
                grid-template-columns: 1fr 1fr 1fr;
            }
            .stat-card {
                padding: 12px 8px;
            }
            .actions {
                justify-content: stretch;
            }
            .actions .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-wrapper">
                <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Logo Contactos CU">
                    <defs>
                        <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#007bff"/>
                            <stop offset="100%" stop-color="#003d80"/>
                        </linearGradient>
                    </defs>
                    <circle cx="60" cy="60" r="56" fill="url(#g1)"/>
                    <path d="M38 30 C38 26 42 22 46 22 L74 22 C78 22 82 26 82 30 L82 90 C82 94 78 98 74 98 L46 98 C42 98 38 94 38 90 Z" fill="#fff" opacity="0.95"/>
                    <rect x="50" y="28" width="20" height="3" rx="1.5" fill="#0056b3"/>
                    <circle cx="60" cy="88" r="5" fill="#0056b3"/>
                    <path d="M48 45 Q60 38 72 45" stroke="#0056b3" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    <path d="M44 52 Q60 42 76 52" stroke="#0056b3" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
                    <path d="M40 59 Q60 46 80 59" stroke="#0056b3" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.35"/>
                    <circle cx="60" cy="68" r="3" fill="#00c853"/>
                </svg>
                <div>
                    <h1>Contactos | CU</h1>
                    <h2>Datos Telefónicos de ETECSA</h2>
                </div>
            </div>
        </header>

        <div class="search-panel">
            <div class="form-group">
                <label for="cantidad">Cant. Teléfonos</label>
                <input type="number" id="cantidad" min="1" max="1000" value="10">
            </div>
            <div class="form-group">
                <label>Tipo</label>
                <div class="radio-group">
                    <label><input type="radio" name="tipo" value="Mixto" checked> Mixto</label>
                    <label><input type="radio" name="tipo" value="Movil"> Móvil</label>
                    <label><input type="radio" name="tipo" value="Fijo"> Fijo</label>
                </div>
            </div>
            <div class="form-group">
                <label for="edad">Rango de Edad</label>
                <select id="edad">
                    <option value="Todos">Todos (18-90)</option>
                    <option value="Joven">Joven (18-35)</option>
                    <option value="Adulto">Adulto (18-65)</option>
                    <option value="Mayor">Mayor (50-80)</option>
                </select>
            </div>
            <div class="form-group">
                <button class="btn" id="buscarBtn">Buscar</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Total</h3>
                <p id="statTotal">0</p>
            </div>
            <div class="stat-card">
                <h3>Móviles</h3>
                <p id="statMoviles">0</p>
            </div>
            <div class="stat-card">
                <h3>Fijos</h3>
                <p id="statFijos">0</p>
            </div>
        </div>

        <div class="table-container">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Nombre Completo</th>
                        <th>Teléfono</th>
                        <th>Provincia</th>
                        <th>Dirección</th>
                        <th>Edad</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="5" class="empty-state">Realice una búsqueda para mostrar los datos.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="actions">
            <button class="btn btn-success" id="descargarBtn">Descargar</button>
        </div>
    </div>

    <script>
        const provincias = [
            { nombre: "Pinar del Río", codigo: "48" },
            { nombre: "Artemisa", codigo: "47" },
            { nombre: "La Habana", codigo: "7" },
            { nombre: "Mayabeque", codigo: "47" },
            { nombre: "Matanzas", codigo: "45" },
            { nombre: "Villa Clara", codigo: "42" },
            { nombre: "Cienfuegos", codigo: "43" },
            { nombre: "Sancti Spíritus", codigo: "41" },
            { nombre: "Ciego de Ávila", codigo: "33" },
            { nombre: "Camagüey", codigo: "32" },
            { nombre: "Las Tunas", codigo: "31" },
            { nombre: "Holguín", codigo: "24" },
            { nombre: "Granma", codigo: "23" },
            { nombre: "Santiago de Cuba", codigo: "22" },
            { nombre: "Guantánamo", codigo: "21" },
            { nombre: "Isla de la Juventud", codigo: "46" }
        ];

        const nombres = [
            "Yosvani","Yadiel","Yuniel","Raidel","Dariel","Yasiel","Lázaro","Osvaldo",
            "Yoenis","Ariel","Michel","Javier","Luis","Pedro","Juan","Carlos","Mario",
            "Rafael","Roberto","Eduardo","Manuel","Omar","José","Miguel","Daniel","David",
            "Marcos","Adrián","Leo","Andy","Aroldis","Yordan","Yasmani","Alexander","Ernesto",
            "Odalys","Yamila","Yanet","Yadira","Yurisbel","Yusnabi","Yusimi","Yailin","Dailenis",
            "Yaima","Yenifer","Yudith","Yuriana","Yanara","Yisel","Yamile","Yamilka"
        ];

        const apellidos = [
            "Rodríguez","Pérez","González","Hernández","García","Martínez","Díaz","Fernández",
            "López","Sánchez","Ramírez","Torres","Flores","Rivera","Gómez","Alonso","Romero",
            "Herrera","Medina","Ruiz","Vargas","Castro","Silva","Ortega","Delgado","Cruz",
            "Núñez","Aguilar","Reyes","Morales","Ortiz","Gutiérrez","Chávez","Ramos","Mendoza",
            "Jiménez","Moreno","Vega","Molina","Cabrera","Cervantes","Bermúdez","Castañeda","Peña"
        ];

        const calles = [
            "Calle 23","Avenida 41","Calle Obispo","Calle San Lázaro","Avenida de los Presidentes",
            "Calle G","Calle 10","Avenida 26","Calle 100","Avenida Boyeros","Calle Neptuno",
            "Calle Reina","Calle Monte","Avenida Independencia","Calle 5ta","Calle 70","Calle 42",
            "Calle 36","Avenida 31","Calle 12","Calle 8","Avenida 51","Calle 14","Calle 18"
        ];

        let datosGenerados = [];

        function ri(a, b) {
            return Math.floor(Math.random() * (b - a + 1)) + a;
        }

        function genName() {
            return `${nombres[ri(0, nombres.length - 1)]} ${apellidos[ri(0, apellidos.length - 1)]} ${apellidos[ri(0, apellidos.length - 1)]}`;
        }

        function genPhone(tipo, prov) {
            if (tipo === "Movil") {
                const p = ["51","52","53","54","55","56","58"][ri(0, 6)];
                return `+53 ${p} ${ri(100, 999)} ${ri(1000, 9999)}`;
            }
            const c = prov.codigo;
            if (c === "7") return `+53 7 ${ri(200, 999)} ${ri(1000, 9999)}`;
            return `+53 ${c} ${ri(20, 99)} ${ri(10, 99)} ${ri(10, 99)}`;
        }

        function genAddr(prov) {
            return `${calles[ri(0, calles.length - 1)]} #${ri(1, 999)} e/ ${calles[ri(0, calles.length - 1)]} y ${calles[ri(0, calles.length - 1)]}, ${prov.nombre}`;
        }

        function ageRange(r) {
            if (r === "Joven") return [18, 35];
            if (r === "Adulto") return [18, 65];
            if (r === "Mayor") return [50, 80];
            return [18, 90];
        }

        function generarDatos() {
            const cant = Math.max(1, Math.min(1000, parseInt(document.getElementById("cantidad").value) || 10));
            const tipo = document.querySelector('input[name="tipo"]:checked').value;
            const [mn, mx] = ageRange(document.getElementById("edad").value);
            datosGenerados = [];
            let mov = 0, fij = 0;

            for (let i = 0; i < cant; i++) {
                const prov = provincias[ri(0, provincias.length - 1)];
                let t = tipo === "Mixto" ? (Math.random() > 0.5 ? "Movil" : "Fijo") : tipo;
                if (t === "Movil") mov++; else fij++;
                datosGenerados.push({
                    nombre: genName(),
                    telefono: genPhone(t, prov),
                    provincia: prov.nombre,
                    direccion: genAddr(prov),
                    edad: ri(mn, mx)
                });
            }

            document.getElementById("statTotal").textContent = cant;
            document.getElementById("statMoviles").textContent = mov;
            document.getElementById("statFijos").textContent = fij;
            renderTable();
        }

        function renderTable() {
            const tb = document.getElementById("tableBody");
            if (!datosGenerados.length) {
                tb.innerHTML = '<tr><td colspan="5" class="empty-state">Realice una búsqueda para mostrar los datos.</td></tr>';
                return;
            }
            tb.innerHTML = datosGenerados.map(d =>
                `<tr><td>${d.nombre}</td><td>${d.telefono}</td><td>${d.provincia}</td><td>${d.direccion}</td><td>${d.edad}</td></tr>`
            ).join("");
        }

        function descargarCSV() {
            if (!datosGenerados.length) return;
            const h = ["Nombre Completo","Teléfono","Provincia","Dirección","Edad"];
            const csv = [
                h.join(","),
                ...datosGenerados.map(d =>
                    [`"${d.nombre}"`,`"${d.telefono}"`,`"${d.provincia}"`,`"${d.direccion}"`,d.edad].join(",")
                )
            ].join("\n");
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: "text/csv;charset=utf-8;" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "contactos_etecsa.csv";
            a.style.display = "none";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
        }

        document.getElementById("buscarBtn").addEventListener("click", generarDatos);
        document.getElementById("descargarBtn").addEventListener("click", descargarCSV);
    </script>
</body>
</html>
